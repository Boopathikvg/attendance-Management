<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
        width: 900px;
        height: 500px;
        display: flex;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        animation: fadeIn 1s ease-in-out;
    }

    /* LEFT SIDE (IMAGE) */
    .left {
        width: 50%;
        background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center/cover;
        position: relative;
    }

    .left::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }

    /* RIGHT SIDE (FORM) */
    .right {
        width: 50%;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        animation: slideIn 1s ease;
    }

    .right h2 {
        color: #fff;
        margin-bottom: 20px;
    }

    .input-box {
        width: 250px;
        margin: 10px 0;
    }

    .input-box input {
        width: 100%;
        padding: 10px;
        border: none;
        outline: none;
        border-radius: 8px;
        background: rgba(255,255,255,0.2);
        color: #fff;
        transition: 0.3s;
    }

    .input-box input::placeholder {
        color: #ddd;
    }

    .input-box input:focus {
        background: rgba(255,255,255,0.4);
        transform: scale(1.05);
    }

    button {
        margin-top: 15px;
        padding: 10px 30px;
        border: none;
        border-radius: 8px;
        background: #fff;
        color: #333;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #333;
        color: #fff;
        transform: scale(1.05);
    }

    /* Animations */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes slideIn {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

</style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left"></div>

    <!-- RIGHT LOGIN -->
    <div class="right">
        <h2>Login</h2>

        <form action="/" method="post">
            <div class="input-box">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
